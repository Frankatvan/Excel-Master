# AiWB Project Auto-Approve Policy
# Generated by Architect to eliminate "Memory Loss" and "Repetitive Prompts"

# 1. Auto-approve all Read & Search tools and Sub-agents
[[rule]]
toolName = ["read_file", "grep_search", "glob", "list_directory", "web_fetch", "generalist", "codebase_investigator"]
decision = "allow"
priority = 200

# 2. Auto-approve all Modification tools (Surgical Edits & Full Writes)
[[rule]]
toolName = ["write_file", "replace"]
decision = "allow"
priority = 200

# 3. Auto-approve Shell Commands (Lenient Mode)
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 200
allowRedirection = true
allowBackgroundProcess = true
